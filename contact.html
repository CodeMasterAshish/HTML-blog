    <h1>Contact us</h1>

    <p>Send us a message and we will get back to you.</p>

    <form>

        <table>
            <tr>
                <td><label for="fullname">Full name</label></td>
                <td>
                    <input type="text" id="fullname" name="fullname" size="60">
                </td>
            </tr>

            <tr>
                <td><label for="email">Email</label></td>
                <td>
                    <input type="email" id="email" name="email" size="60">
                </td>
            </tr>

            <tr>
                <td><label for="subject">Subject</label></td>
                <td>
                    <select id="subject" name="subject">
                        <option selected disabled>Choose a topic</option>
                        <option>General Inquiry</option>
                        <option>Technical Support</option>
                        <option>Billing</option>
                        <option>Feedback</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td valign="top">
                    <label for="message">Message</label>
                </td>
                <td>
                    <textarea id="message" name="message" rows="10" cols="60"></textarea>
                </td>
            </tr>
        </table>

        <br>

        <p><strong>How did you hear about us?</strong></p>

        <input type="radio" id="search" name="source" value="Search">
        <label for="search">Search</label>
        <br><br>

        <input type="radio" id="friend" name="source" value="Friend">
        <label for="friend">Friend</label>
        <br><br>

        <input type="radio" id="social" name="source" value="Social Media">
        <label for="social">Social media</label>

        <br><br>

        <input type="checkbox" id="updates" name="updates">
        <label for="updates">Send me product updates</label>

        <br><br>

        <input type="submit" value="Send message">

    </form>
